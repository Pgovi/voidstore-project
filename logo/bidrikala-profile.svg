  <circle cx="200" cy="182" r="3" fill="url(#gold)" opacity="0.6"/>

  <path d="M178 220 Q185 210 195 215 Q190 225 178 220 Z" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <path d="M222 220 Q215 210 205 215 Q210 225 222 220 Z" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>

