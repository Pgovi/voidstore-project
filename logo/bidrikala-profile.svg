<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b"/>
      <stop offset="50%" style="stop-color:#b08d3e"/>
      <stop offset="100%" style="stop-color:#8a6d2f"/>
    </linearGradient>
    <linearGradient id="silverShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0d0"/>
      <stop offset="50%" style="stop-color:#c9b896"/>
      <stop offset="100%" style="stop-color:#b08d3e"/>
