  </defs>

  <!-- Dark circle background (matte black like Bidriware) -->
  <circle cx="200" cy="200" r="200" fill="#1a1714"/>

  <!-- Outer decorative ring (silver inlay inspired) -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#gold)" stroke-width="0.5"/>

