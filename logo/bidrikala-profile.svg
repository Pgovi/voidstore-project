  <circle cx="95" cy="95" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="305" cy="95" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="95" cy="305" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="305" cy="305" r="2.5" fill="url(#gold)" opacity="0.5"/>

