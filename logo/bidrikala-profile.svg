    M175 130
    C175 130 168 132 165 138
    C162 144 164 148 164 148
    L160 150
    C155 152 152 158 152 162
    L148 220
    C146 240 150 260 158 275
    C162 282 170 288 178 292
    L180 294
    C185 296 192 298 200 298
    C208 298 215 296 220 294
    L222 292
    C230 288 238 282 242 275
    C250 260 254 240 252 220
    L248 162
    C248 158 245 152 240 150
    L236 148
    C236 148 238 144 235 138
    C232 132 225 130 225 130
    C222 126 212 125 200 125
    C188 125 178 126 175 130
