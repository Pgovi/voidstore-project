  <circle cx="200" cy="245" r="1.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="212" cy="250" r="1.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="194" cy="262" r="1.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="206" cy="262" r="1.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="200" cy="275" r="1.5" fill="url(#gold)" opacity="0.5"/>

  <!-- BK monogram -->
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="url(#gold)" letter-spacing="6">BK</text>

