  <circle cx="200" cy="52" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="200" cy="348" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="52" cy="200" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="348" cy="200" r="3" fill="url(#gold)" opacity="0.6"/>

